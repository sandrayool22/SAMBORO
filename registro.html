<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samboro | Registro cliente</title>


<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">



<style>


@media(max-width:768px){


.contenido{

padding:25px !important;

text-align:center;

}


.logo{

font-size:2rem !important;

}


.titulo{

font-size:2.5rem !important;

}


.imagen{

min-height:300px !important;

}



}



</style>


</head>




<body style="background:#eee8df;">





<section>


<div class="columns is-gapless">






<!-- IZQUIERDA -->


<div class="column is-6 contenido"

style="

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:60px;

">






<div style="max-width:520px;width:100%">





<p class="title logo"

style="

color:#b51d2a;

letter-spacing:3px;

">

SAMBORO

</p>







<h1 class="title titulo has-text-weight-light"

style="

color:#2c2c2c;

font-size:4rem;

">


Registro de

<span style="color:#b51d2a;">

cliente

</span>


</h1>







<p class="subtitle is-5"

style="

color:#555;

line-height:1.6;

">


Registra la información del cliente
para conocer sus necesidades
y mejorar la experiencia comercial.


</p>








<br>









<!-- DATOS FIJOS PRUEBA -->


<div class="box"


style="

border-radius:15px;

background:#b51d2a;

color:white;

box-shadow:0 10px 25px rgba(0,0,0,.15);

">



<p>

Vendedor activo:

<b>

RCIFUENTES

</b>

</p>




<p>

Sucursal:

<b>

San Cristóbal

</b>

</p>




</div>









<!-- FORMULARIO -->


<div class="box"


style="

border-radius:18px;

background:rgba(74,74,74,.88);

box-shadow:0 15px 35px rgba(0,0,0,.18);

padding:30px;

">






<h2 class="title is-4"

style="

color:white;

text-align:center;

">


¿Qué fue lo que lo trajo por aquí hoy?


</h2>








<form id="registroForm">






<div class="field">


<label class="label"

style="color:white;">


Respuesta del cliente


</label>





<textarea


class="textarea"

id="respuesta"


placeholder="Ejemplo: Estoy buscando cambiar el piso de mi casa..."

required


style="

background:rgba(255,255,255,.15);

color:white;

border:none;

">



</textarea>






</div>








<button


class="button is-fullwidth is-medium"


style="

background:#b51d2a;

color:white;

border-radius:30px;

border:none;

font-weight:bold;

">


Guardar registro


</button>








</form>








</div>







</div>


</div>









<!-- IMAGEN -->


<div class="column is-6 imagen"

style="min-height:100vh;">





<img


src="https://www.samboro.com/wp-content/uploads/2025/12/342-GRIS-VT00015606-es-Okc92Xikw6RZmswN.jpg"



style="

width:100%;

height:100%;

min-height:100vh;

object-fit:cover;

">



</div>







</div>







<script>





document

.getElementById("registroForm")

.addEventListener("submit",function(e){



e.preventDefault();






let datos = {


vendedor:"RCIFUENTES",


sucursal:"San Cristóbal",


respuesta:

document

.getElementById("respuesta")

.value



};







console.log(datos);







fetch(


"https://script.google.com/macros/s/AKfycbwJGF6YvAQi_YrNS90aJyH7QTCfkqJcrtjMpzrXqLGqM6_0HPdGI-pCeSs65zuEmD6Aug/exec",


{


method:"POST",


mode:"no-cors",


body:JSON.stringify(datos)


}



)







.then(()=>{


alert("Registro guardado correctamente");


document

.getElementById("registroForm")

.reset();



})






.catch(error=>{


console.log(error);


alert("Error al guardar registro");


});






});






</script>






</body>


</html>
