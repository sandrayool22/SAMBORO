<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samboro | Registro cliente</title>


<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">


<style>


@media(max-width:768px){


.contenido{

padding:25px !important;

text-align:center;

}


.logo{

font-size:2rem !important;

}


.titulo{

font-size:2.5rem !important;

}


.imagen{

min-height:300px !important;

}


}



</style>


</head>



<body style="background:#eee8df;">





<section>


<div class="columns is-gapless">






<!-- FORMULARIO -->


<div class="column is-6 contenido"


style="

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:60px;

">






<div style="max-width:520px;width:100%">






<p class="title logo"

style="color:#b51d2a;letter-spacing:3px;">

SAMBORO

</p>








<h1 class="title titulo has-text-weight-light"


style="color:#2c2c2c;font-size:4rem;">


Registro de

<span style="color:#b51d2a;">

cliente

</span>


</h1>







<p class="subtitle is-5"

style="color:#555;">


Registra la información del cliente
para conocer sus necesidades comerciales.


</p>







<br>







<!-- DATOS USUARIO -->


<div class="box"


style="

background:#b51d2a;

color:white;

border-radius:15px;

">



<p>

Vendedor:

<b id="mostrarVendedor"></b>

</p>




<p>

Sucursal:

<b id="mostrarSucursal"></b>

</p>




</div>









<!-- FORM -->


<div class="box"


style="

background:rgba(74,74,74,.88);

border-radius:18px;

padding:30px;

">





<h2 class="title is-4"

style="color:white;text-align:center;">


¿Qué fue lo que lo trajo por aquí hoy?


</h2>







<form id="registroForm">





<label class="label"

style="color:white;">

Respuesta cliente

</label>






<textarea


class="textarea"

id="respuesta"


required


placeholder="Ejemplo: Busco remodelar mi casa..."


style="

background:rgba(255,255,255,.15);

color:white;

border:none;

">



</textarea>







<br>






<button

class="button is-fullwidth is-medium"


style="

background:#b51d2a;

color:white;

border-radius:30px;

font-weight:bold;

">


Guardar registro


</button>







</form>






<br>





<button

onclick="cambiarUsuario()"


class="button is-light is-fullwidth">


Cambiar usuario


</button>






</div>









</div>


</div>









<!-- IMAGEN -->


<div class="column is-6 imagen"

style="min-height:100vh;">





<img


src="https://www.samboro.com/wp-content/uploads/2025/12/342-GRIS-VT00015606-es-Okc92Xikw6RZmswN.jpg"


style="

width:100%;

height:100%;

min-height:100vh;

object-fit:cover;

">





</div>







</div>






<script>

// DATOS DEL PERFIL
let vendedor = localStorage.getItem("vendedor");
let sucursal = localStorage.getItem("sucursal");

// CONSTANTE DE CONTRASEÑA MAGICA
const CLAVE_MAESTRA = "SAM2026";

// VALIDAR QUE EXISTA PERFIL
if(!vendedor || !sucursal){
    window.location.href="perfil.html";
}

// MOSTRAR DATOS
document.getElementById("mostrarVendedor").innerHTML = vendedor;
document.getElementById("mostrarSucursal").innerHTML = sucursal;

// BLOQUEAR AL ENTRAR SI YA REGISTRÓ HOY
window.addEventListener("pageshow", function(){
    let hoy = new Date().toLocaleDateString();
    let fecha = localStorage.getItem("fechaRegistro");
    let tiene = localStorage.getItem("tieneRegistros");

    if(fecha == hoy && tiene == "SI"){
        // Ya no deshabilitamos el textarea automáticamente para permitir que ingresen la clave al intentar guardar
        console.log("Usuario ya registró hoy, pero puede desbloquear con clave.");
    }
});

// FUNCIÓN PARA VALIDAR CONTRASEÑA
function validarPermisoEspecial() {
    let intento = prompt("Este usuario ya realizó registros hoy. Ingrese la contraseña de autorización para continuar:");
    if (intento === CLAVE_MAESTRA) {
        return true;
    } else if (intento !== null) {
        alert("Contraseña incorrecta. Acción cancelada.");
    }
    return false;
}

// GUARDAR REGISTRO
document.getElementById("registroForm").addEventListener("submit", function(e){
    e.preventDefault();

    let hoy = new Date().toLocaleDateString();
    let fecha = localStorage.getItem("fechaRegistro");
    let tiene = localStorage.getItem("tieneRegistros");

    // Si ya registró hoy, pedimos la contraseña
    if(fecha == hoy && tiene == "SI"){
        if(!validarPermisoEspecial()) {
            return; // Detiene el envío si la clave es incorrecta o cancelan
        }
    }

    let datos = {
        vendedor: vendedor,
        sucursal: sucursal,
        respuesta: document.getElementById("respuesta").value
    };

    console.log(datos);

    fetch(
        "https://script.google.com/macros/s/AKfycbwJGF6YvAQi_YrNS90aJyH7QTCfkqJcrtjMpzrXqLGqM6_0HPdGI-pCeSs65zuEmD6Aug/exec",
        {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(datos)
        }
    )
    .then(() => {
        localStorage.setItem("fechaRegistro", hoy);
        localStorage.setItem("tieneRegistros", "SI");

        alert("Registro guardado correctamente");
        document.getElementById("registroForm").reset();
    });
});

// CAMBIAR USUARIO
function cambiarUsuario(){
    let hoy = new Date().toLocaleDateString();
    let fecha = localStorage.getItem("fechaRegistro");
    let tiene = localStorage.getItem("tieneRegistros");

    // Si ya registró hoy, pide contraseña para poder cambiar de usuario
    if(fecha == hoy && tiene == "SI"){
        if(!validarPermisoEspecial()) {
            return; // Detiene la acción si la clave es incorrecta
        }
    }

    let confirmar = confirm("¿Desea cambiar de usuario?");

    if(confirmar){
        localStorage.clear();
        window.location.href = "perfil.html";
    }
}

</script>






</body>

</html>
