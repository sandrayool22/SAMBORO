<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samboro | Perfil vendedor</title>


<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">



<style>


@media(max-width:768px){


.contenido{

padding:25px !important;

text-align:center;

}


.logo{

font-size:2rem !important;

}


.titulo{

font-size:2.5rem !important;

}



.imagen{

min-height:300px !important;

}



}


</style>



</head>



<body style="background:#eee8df;">





<section>



<div class="columns is-gapless">






<!-- LADO IZQUIERDO -->



<div class="column is-6 contenido"

style="

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:60px;

">





<div style="max-width:500px;width:100%">






<p class="title logo"

style="

color:#b51d2a;

letter-spacing:3px;

">


SAMBORO


</p>






<h1 class="title titulo has-text-weight-light"

style="

color:#2c2c2c;

font-size:4rem;

">


Registro de

<span style="color:#b51d2a;">

seguimiento

</span>


</h1>







<p class="subtitle is-5"

style="

color:#555;

line-height:1.6;

">


Antes de iniciar registra tu información
para identificar tus registros comerciales.


</p>








<br>






<div class="box"

style="

border-radius:18px;

background:rgba(74,74,74,.88);

box-shadow:0 15px 35px rgba(0,0,0,.18);

padding:30px;

">






<h2 class="title is-4"

style="color:white;text-align:center;">


Configuración de vendedor


</h2>







<form id="perfilForm">






<div class="field">


<label class="label"

style="color:white;">

Vendedor

</label>




<input

class="input is-medium"

id="vendedor"

placeholder="Ingrese su nombre"

required


style="

background:rgba(255,255,255,.15);

border:none;

color:white;

">



</div>







<div class="field">


<label class="label"

style="color:white;">


Sucursal


</label>





<div class="select is-fullwidth is-medium">


<select

id="sucursal"

style="width:100%">



<option value="">

Seleccione sucursal

</option>


<option>

Centro Logistico

</option>

<option>

Decocity

</option>

<option>

Outlet Zona 7

</option>


<option>
Zona 7
</option>

  <option>
Zona 9
</option>

    <option>
Zona 11
</option>
<option>

Zona 17

</option>


<option>

San Cristobal

</option>


<option>

Viterra

</option>


</select>



</div>




</div>








<br>





<button

class="button is-fullwidth is-medium"


style="

background:#b51d2a;

color:white;

border-radius:30px;

border:none;

font-weight:bold;

">


Ingresar al sistema


</button>






</form>





</div>





</div>



</div>









<!-- LADO DERECHO -->




<div class="column is-6 imagen"


style="min-height:100vh;">





<img


src="https://www.samboro.com/wp-content/uploads/2025/12/342-GRIS-VT00015606-es-Okc92Xikw6RZmswN.jpg"



style="

width:100%;

height:100%;

min-height:100vh;

object-fit:cover;

">



</div>






</div>






<script>
// EL GUARDIÁN: Si ya hay sesión, expulsa de inmediato a registro.html
(function() {
    let vendedorActivo = localStorage.getItem("vendedor");
    let sucursalActiva = localStorage.getItem("sucursal");

    if (vendedorActivo && sucursalActiva) {
        window.location.replace("registro.html"); 
    }
})();

// GUARDAR DATOS AL INICIAR SESIÓN
document
.getElementById("perfilForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    let vendedor = document.getElementById("vendedor").value;
    let sucursal = document.getElementById("sucursal").value;

    if(sucursal === "") {
        alert("Por favor, seleccione una sucursal.");
        return;
    }

    localStorage.setItem("vendedor", vendedor);
    localStorage.setItem("sucursal", sucursal);

    // Borra perfil.html del historial al avanzar
    window.location.replace("registro.html"); 

});
</script>





</body>


</html>
