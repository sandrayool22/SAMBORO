<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samboro | Registro de seguimiento</title>


<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">


<style>

@media(max-width:768px){


.hero-text{

padding:25px !important;

text-align:center;

}



.logo{

font-size:2rem !important;

text-align:center;

}



.main-title{

font-size:2.5rem !important;

line-height:1.1;

text-align:center;

}



.subtitle-mobile{

font-size:1rem !important;

text-align:center;

}



.form-box{

padding:20px !important;

text-align:left;

}



.form-box h2{

text-align:center;

}



.image-mobile{

min-height:300px !important;

}



}


</style>


</head>



<body style="background:#eee8df;">



<section>



<div class="columns is-gapless">





<!-- IZQUIERDA -->


<div class="column is-6 hero-text"

style="

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:60px;

">



<div style="max-width:520px;width:100%">





<p class="title logo"

style="
color:#b51d2a;
letter-spacing:3px;
">


SAMBORO


</p>





<h1 class="title main-title has-text-weight-light"

style="
color:#2c2c2c;
font-size:4rem;
">


Registro de

<span style="color:#b51d2a;">

seguimiento

</span>


</h1>






<p class="subtitle subtitle-mobile"

style="
color:#555;
line-height:1.5;
">


Plataforma web diseñada para registrar,
analizar y mejorar las oportunidades comerciales
dentro de Samboro.


</p>





<br>





<div class="box form-box"


style="

border-radius:18px;

background:rgba(74,74,74,.88);

box-shadow:0 15px 35px rgba(0,0,0,.18);

">





<h2 class="title is-4"

style="color:white;">


Registro de no compra


</h2>







<form id="registroForm">






<div class="field">


<label class="label"
style="color:white;">

Usuario

</label>



<input

class="input"

id="usuario"

placeholder="Ingrese usuario"

required


style="
background:rgba(255,255,255,.15);
border:none;
color:white;
">


</div>








<div class="field">


<label class="label"
style="color:white;">

Motivo de no compra

</label>




<div class="select is-fullwidth">


<select

id="motivo"

style="width:100%;">


<option>

Seleccione una opción

</option>


<option>

Precio alto

</option>


<option>

Cliente compara opciones

</option>


<option>

No encontró producto

</option>


<option>

Lo va a pensar

</option>


<option>

Otro

</option>


</select>



</div>



</div>








<div class="field">


<label class="label"
style="color:white;">


Comentario adicional


</label>




<textarea

class="textarea"

id="comentario"

placeholder="Detalle del cliente..."


style="
background:rgba(255,255,255,.15);
border:none;
color:white;
">

</textarea>



</div>







<button

class="button is-fullwidth"


style="

background:#b51d2a;

color:white;

border-radius:30px;

font-weight:bold;

">


Guardar registro


</button>




</form>




</div>




</div>


</div>







<!-- IMAGEN -->


<div class="column is-6 image-mobile"


style="

min-height:100vh;

overflow:hidden;

">



<img

src="https://www.samboro.com/wp-content/uploads/2025/12/342-GRIS-VT00015606-es-Okc92Xikw6RZmswN.jpg"


style="

width:100%;

height:100%;

object-fit:cover;

min-height:100vh;

">



</div>







</div>






<script>


document
.getElementById("registroForm")
.addEventListener("submit",function(e){


e.preventDefault();


let datos={

usuario:
usuario.value,

motivo:
motivo.value,

comentario:
comentario.value

};



fetch(

"https://script.google.com/macros/s/AKfycbwJGF6YvAQi_YrNS90aJyH7QTCfkqJcrtjMpzrXqLGqM6_0HPdGI-pCeSs65zuEmD6Aug/exec",

{

method:"POST",

mode:"no-cors",

body:JSON.stringify(datos)

}

)



.then(()=>{

alert("Registro guardado correctamente");

this.reset();


});



});


</script>



</body>

</html>
