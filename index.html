<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Samboro | Registro de seguimiento</title>


    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">


</head>


<body style="background:#eee8df;">



<section class="hero is-fullheight">


<div class="hero-body">


<div class="container">


<div class="columns is-vcentered">


<!-- LADO IZQUIERDO -->

<div class="column is-6">


<p class="title is-2" 
style="color:#b51d2a; letter-spacing:3px;">

SAMBORO

</p>



<h1 class="title is-1 has-text-weight-light"
style="color:#2c2c2c;">


Gestión inteligente
<br>

<span style="color:#b51d2a;">
de proyectos
</span>


</h1>



<p class="subtitle is-5"
style="color:#555; line-height:1.6;">


Plataforma web diseñada para registrar,
analizar y mejorar las oportunidades comerciales
dentro de Samboro.


</p>



<br>



<!-- FORMULARIO -->


<div class="box"

style="
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
background:#4a4a4a;
">



<h2 class="title is-4"
style="color:white;">

Registro de no compra

</h2>




<form id="registroForm">



<div class="field">


<label class="label"
style="color:white;">

Usuario

</label>



<div class="control">


<input 
class="input is-medium"

type="text"

id="usuario"

placeholder="Ingrese usuario"

required

style="
background:#5a5a5a;
color:white;
border:none;
">


</div>


</div>






<div class="field">


<label class="label"
style="color:white;">

Motivo de no compra

</label>



<div class="control">


<div class="select is-medium is-fullwidth">


<select 
id="motivo"

style="
background:#5a5a5a;
color:white;
border:none;
">


<option>
Seleccione una opción
</option>


<option>
Precio alto
</option>


<option>
Cliente compara opciones
</option>


<option>
No encontró producto
</option>


<option>
Lo va a pensar
</option>


<option>
Falta de presupuesto
</option>


<option>
Otro
</option>


</select>


</div>


</div>


</div>







<div class="field">


<label class="label"
style="color:white;">

Comentario adicional

</label>




<textarea

class="textarea"

id="comentario"

placeholder="Detalle del cliente..."

style="
background:#5a5a5a;
color:white;
border:none;
">


</textarea>



</div>








<button

class="button is-medium is-fullwidth"

style="
background:#b51d2a;
color:white;
border-radius:30px;
border:none;
">


Guardar registro


</button>




</form>



</div>



</div>








<!-- LADO DERECHO -->


<div class="column is-6">



<div class="box"

style="
height:520px;
padding:0;
overflow:hidden;
border-radius:0;
background:#222;
">



<img

src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c"

style="
width:100%;
height:100%;
object-fit:cover;
opacity:.85;
">


</div>



</div>







</div>


</div>


</div>


</section>








<script>


document
.getElementById("registroForm")
.addEventListener("submit", function(e){


e.preventDefault();



alert("Registro guardado correctamente");



this.reset();



});



</script>



</body>


</html>
