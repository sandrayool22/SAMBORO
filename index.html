<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samboro | Registro de seguimiento</title>


<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">


</head>



<body style="background:#eee8df;">



<section class="hero">


<div class="columns is-gapless is-vcentered"
style="min-height:100vh;">





<!-- IZQUIERDA -->


<div class="column is-6"

style="

padding:40px;

display:flex;

justify-content:center;

align-items:center;

">



<div style="
width:100%;
max-width:520px;
">





<p class="title is-2" 
style="color:#b51d2a; letter-spacing:3px;">

SAMBORO

</p>






<h1 class="title is-1 has-text-weight-light"
style="color:#2c2c2c;">


Registro de 

<span style="color:#b51d2a;">

seguimiento

</span>


</h1>





<p class="subtitle is-5"
style="color:#555; line-height:1.6;">


Plataforma web diseñada para registrar,
analizar y mejorar las oportunidades comerciales
dentro de Samboro.


</p>






<br>





<div class="box"

style="

border-radius:15px;

box-shadow:0 15px 40px rgba(0,0,0,.18);

background:rgba(74,74,74,.90);

padding:30px;

">





<h2 class="title is-4"
style="color:white;">

Registro de no compra

</h2>






<form id="registroForm">





<div class="field">


<label class="label"
style="color:white;">

Usuario

</label>



<input 

class="input is-medium"

type="text"

id="usuario"

placeholder="Ingrese usuario"

required


style="

background:rgba(255,255,255,.12);

color:white;

border:none;

">


</div>







<div class="field">


<label class="label"
style="color:white;">

Motivo de no compra

</label>



<div class="select is-fullwidth is-medium">


<select

id="motivo"

style="

background:#5a5a5a;

color:white;

border:none;

">


<option>
Seleccione una opción
</option>


<option>
Precio alto
</option>


<option>
Cliente compara opciones
</option>


<option>
No encontró producto
</option>


<option>
Lo va a pensar
</option>


<option>
Falta de presupuesto
</option>


<option>
Otro
</option>



</select>


</div>


</div>








<div class="field">


<label class="label"
style="color:white;">

Comentario adicional

</label>



<textarea

class="textarea"

id="comentario"

placeholder="Detalle del cliente..."

style="

background:rgba(255,255,255,.12);

color:white;

border:none;

">


</textarea>


</div>







<button

class="button is-medium is-fullwidth"

style="

background:#b51d2a;

color:white;

border-radius:30px;

border:none;

">


Guardar registro


</button>





</form>





</div>






</div>


</div>









<!-- IMAGEN -->


<div class="column is-6"

style="

min-height:100vh;

">





<img

src="https://www.samboro.com/wp-content/uploads/2025/12/342-GRIS-VT00015606-es-Okc92Xikw6RZmswN.jpg"


style="

width:100%;

height:100%;

min-height:100vh;

object-fit:cover;

">



</div>







</div>






<script>


document
.getElementById("registroForm")
.addEventListener("submit", function(e){


e.preventDefault();



let datos={


usuario:
document.getElementById("usuario").value,


motivo:
document.getElementById("motivo").value,


comentario:
document.getElementById("comentario").value


};



fetch(

"https://script.google.com/macros/s/AKfycbwJGF6YvAQi_YrNS90aJyH7QTCfkqJcrtjMpzrXqLGqM6_0HPdGI-pCeSs65zuEmD6Aug/exec",

{

method:"POST",

mode:"no-cors",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify(datos)


})


.then(()=>{


alert("Registro guardado correctamente");


document
.getElementById("registroForm")
.reset();


});



});


</script>



</body>

</html>
