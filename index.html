<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Samboro | Registro de seguimiento</title>

    <link rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

</head>


<body style="background:#eee8df;">


<section class="hero is-fullheight">


<div class="hero-body">


<div class="container">


<div class="columns is-vcentered">


<!-- LADO IZQUIERDO -->

<div class="column is-6">


<p class="title is-2" 
style="color:#b51d2a; letter-spacing:3px;">

SAMBORO

</p>


<h1 class="title is-1 has-text-weight-light"
style="color:#2c2c2c;">

Registro de
<br>

<span style="color:#b51d2a;">
motivos de no compra
</span>

</h1>



<p class="subtitle is-5"
style="color:#555; line-height:1.6;">

Herramienta interna diseñada para registrar,
analizar y mejorar la experiencia comercial
dentro de Samboro.

</p>


<br>


<div class="box"
style="
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
background:white;
">


<h2 class="title is-4">
Nuevo registro
</h2>



<form id="registroForm">


<div class="field">

<label class="label">
Usuario vendedor
</label>

<div class="control">

<input class="input is-medium"
type="text"
placeholder="Nombre del vendedor"
id="usuario"
required>

</div>

</div>



<div class="field">

<label class="label">
Motivo de no compra
</label>


<div class="control">

<div class="select is-medium is-fullwidth">


<select id="motivo">

<option>
Seleccione una opción
</option>

<option>
Precio alto
</option>

<option>
Cliente compara opciones
</option>

<option>
No encontró producto
</option>

<option>
Lo va a pensar
</option>

<option>
Otro
</option>


</select>


</div>

</div>

</div>



<div class="field">


<label class="label">
Comentario adicional
</label>


<textarea 
class="textarea"
placeholder="Detalle del cliente..."
id="comentario">
</textarea>


</div>



<button 
class="button is-medium is-fullwidth"
style="
background:#b51d2a;
color:white;
border-radius:30px;
">

Guardar registro

</button>



</form>


</div>



</div>




<!-- LADO DERECHO -->

<div class="column is-6">


<div class="has-text-centered">


<div class="box"
style="
height:520px;
display:flex;
align-items:center;
justify-content:center;
background:#1e1e1e;
border-radius:0;
overflow:hidden;
">


<img 
src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c"
style="
width:100%;
height:100%;
object-fit:cover;
opacity:.85;
">


</div>


</div>


</div>


</div>



</div>


</div>


</section>



<script>


document.getElementById("registroForm")
.addEventListener("submit",function(e){


e.preventDefault();


alert("Registro guardado correctamente");


this.reset();


});


</script>



</body>

</html>
