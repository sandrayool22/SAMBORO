<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
<title>Dashboard Samboro</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{

    background:#F4EFE7;
    font-family:'Roboto',sans-serif;

}

.hero-samboro{

    color:#b51d2a;
    font-size:45px;
    font-weight:bold;

}

.subtitulo{

    font-size:18px;
    color:#555;

}

.card-dashboard{

    border-radius:18px;

}

.kpi{

    text-align:center;

}

.kpi h2{

    color:#b51d2a;
    font-size:40px;

}

.panel{

    border-radius:18px;
    min-height:380px;

}

</style>

</head>

<body>

<section class="section">

<div class="container">

<div class="mb-6">

<div class="hero-samboro">

SAMBORO

</div>

<h1 class="title is-1">

Business <span style="color:#b51d2a;">Intelligence</span>

</h1>

<p class="subtitulo">

Análisis de tráfico y necesidades comerciales

</p>

</div>

<div class="box card-dashboard">

<div class="columns">

<div class="column">

<label>Fecha</label>

<input class="input" type="date">

</div>

<div class="column">

<label>Sucursal</label>

<div class="select is-fullwidth">

<select>

<option>Todas</option>

</select>

</div>

</div>

<div class="column">

<label>Vendedor</label>

<div class="select is-fullwidth">

<select>

<option>Todos</option>

</select>

</div>

</div>

<div class="column is-narrow">

<label>&nbsp;</label>

<button class="button is-danger is-fullwidth">

Actualizar

</button>

</div>

</div>

</div>

<div class="columns">

<div class="column">

<div class="box card-dashboard kpi">

<p>Clientes Hoy</p>

<h2>0</h2>

</div>

</div>

<div class="column">

<div class="box card-dashboard kpi">

<p>Tráfico Total</p>

<h2>0</h2>

</div>

</div>

<div class="column">

<div class="box card-dashboard kpi">

<p>Captura %</p>

<h2>0%</h2>

</div>

</div>

<div class="column">

<div class="box card-dashboard kpi">

<p>Sucursal Líder</p>

<h2>-</h2>

</div>

</div>

</div>

<div class="columns">

<div class="column">

<div class="box panel">

<h3 class="title is-5">

Tráfico de Clientes

</h3>

</div>

</div>

</div>

<div class="columns">

<div class="column">

<div class="box panel">

<h3 class="title is-5">

Tráfico vs Respuestas

</h3>

</div>

</div>

</div>

<div class="columns">

<div class="column">

<div class="box panel">

<h3 class="title is-5">

Ranking Asesores

</h3>

</div>

</div>

<div class="column">

<div class="box panel">

<h3 class="title is-5">

Ranking Sucursales

</h3>

</div>

</div>

</div>

<div class="columns">

<div class="column">

<div class="box panel">

<h3 class="title is-5">

Respuestas más frecuentes

</h3>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
